services:
  db:
    image: postgres:15
    restart: always
    ports:
      - 54326:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: local
    volumes:
      - pgdata:/var/lib/postgresql/data
  mailpit:
    image: axllent/mailpit:latest
    restart: always
    ports:
      - 1025:1025 # SMTP
      - 8025:8025 # Web UI
volumes:
  pgdata: {}
